services:
  # ── PostgreSQL + PostGIS (C1.1, C1.3, C1.4) ────────────────────────────────
  # Base relationnelle : couche Gold (transactions, prix médians, indicateurs,
  # géométries des arrondissements). Sert l'API pour les requêtes filtrables.
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: urban_data
      POSTGRES_USER: urban
      POSTGRES_PASSWORD: urban_dev_pwd
    ports:
      # Port hôte 5433 (évite conflit avec un Postgres local sur 5432).
      # Port interne 5432 inchangé — l'API se connecte via postgres:5432.
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init/postgres:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U urban -d urban_data"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MongoDB (C1.2) ─────────────────────────────────────────────────────────
  # Base non-relationnelle : couche Bronze brute (payloads JSON hétérogènes
  # des 13 APIs), data catalog, événements de streaming micro-batch.
  mongo:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: urban
      MONGO_INITDB_ROOT_PASSWORD: urban_dev_pwd
      MONGO_INITDB_DATABASE: urban_data
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./db/init/mongo:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 })"]
      interval: 10s
      timeout: 15s
      retries: 5

  # ── Adminer (UI web pour PostgreSQL) ───────────────────────────────────────
  # Accès : http://localhost:8080
  # Système : PostgreSQL | Serveur : postgres | User : urban | Pwd : urban_dev_pwd
  # Base : urban_data
  adminer:
    image: adminer:latest
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── mongo-express (UI web pour MongoDB) ────────────────────────────────────
  # Accès : http://localhost:8081  (login admin / pass : urban-admin / urban_dev_pwd)
  mongo-express:
    image: mongo-express:latest
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: urban
      ME_CONFIG_MONGODB_ADMINPASSWORD: urban_dev_pwd
      ME_CONFIG_MONGODB_URL: mongodb://urban:urban_dev_pwd@mongo:27017/?authSource=admin
      ME_CONFIG_BASICAUTH_USERNAME: urban-admin
      ME_CONFIG_BASICAUTH_PASSWORD: urban_dev_pwd
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  # ── API FastAPI (C2.1 + C1.4 scalabilité) ──────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data:ro   # Data Lake en lecture seule (Parquet pour analytique)
    environment:
      - API_KEY=urban-explorer-dev-key
      - POSTGRES_URI=postgresql+psycopg2://urban:urban_dev_pwd@postgres:5432/urban_data
      - MONGO_URI=mongodb://urban:urban_dev_pwd@mongo:27017/urban_data?authSource=admin
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Dashboard statique servi par nginx ─────────────────────────────────────
  dashboard:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./dashboard:/usr/share/nginx/html:ro
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
  mongo_data:
